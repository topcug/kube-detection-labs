title: Shell Spawned in Container
id: a1b2c3d4-0001-4e5f-8a9b-clarifyintel01
status: stable
description: >
  Detects a shell process spawning inside a running container at runtime.
  This may indicate attacker execution or unauthorized developer access to production.
references:
  - https://attack.mitre.org/techniques/T1059/
  - https://clarifyintel.com/labs/lab-001-shell-in-container
author: ClarifyIntel
date: 2026-04-04
tags:
  - attack.execution
  - attack.t1059
logsource:
  product: falco
  service: falco
detection:
  selection:
    rule: 'Shell Spawned in Container'
  condition: selection
falsepositives:
  - Known debug images that legitimately include shells
  - CI/CD runners that exec into pods for smoke testing
  - Authorized kubectl exec during incident response
level: high
