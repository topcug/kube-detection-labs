title: Kubernetes Secret Enumeration via API Server
id: lab-008-secret-enumeration
status: experimental
description: >
  An identity listed or read Kubernetes Secrets via the API server.
  Detected via Kubernetes audit log. High-value credential access event.
references:
  - https://attack.mitre.org/techniques/T1552/007/
  - https://clarifyintel.com/labs/lab-008-secret-enumeration
author: ClarifyIntel
date: 2026-04-05
tags:
  - attack.credential_access
  - attack.t1552.007
logsource:
  product: kubernetes
  service: audit
detection:
  selection:
    verb:
      - list
      - get
      - watch
    resource: secrets
  filter_known_tools:
    user.username:
      - 'system:serviceaccount:kube-system:default'
      - 'vault-agent'
      - 'external-secrets-operator'
      - 'system:serviceaccount:cert-manager:cert-manager'
  condition: selection and not filter_known_tools
falsepositives:
  - External Secrets Operator, Vault Agent, ArgoCD (add to filter)
  - Cluster upgrade processes in kube-system
level: critical
